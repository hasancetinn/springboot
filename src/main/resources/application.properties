spring.application.name=demo

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/ecommerce_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway — versioned DB migrations (files in db/migration/V{n}__{description}.sql)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Redis Configuration
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

# Cache: default in-memory (works without Redis). For Redis: SPRING_CACHE_TYPE=redis
spring.cache.type=${SPRING_CACHE_TYPE:simple}
spring.cache.redis.time-to-live=10m

# JWT Configuration - IMPORTANT: Change secret key for production using environment variables!
# You should generate a 256-bit secret key and set it as JWT_SECRET_KEY env var
application.security.jwt.secret-key=${JWT_SECRET_KEY:mySecretKeyForJWTwhichIsLongEnough32chars!123}

# JWT Expiration: 1 hour (3600000 ms)
application.security.jwt.expiration=${JWT_EXPIRATION:3600000}

# Refresh Token Expiration: 7 days (604800000 ms)
application.security.jwt.refresh-token.expiration=${JWT_REFRESH_EXPIRATION:604800000}

